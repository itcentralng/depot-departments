<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depot Nigerian Army — Departments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/images/nigerian_army_depot_pan_left_to_right_10s.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <img src="assets/images/logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
    <div class="brand">
      <span class="brand-main">NIGERIAN ARMY DEPOT</span>
      <span class="brand-sub">Osogbo · Departments</span>
    </div>
    <button class="back-btn hidden" id="back-btn" onclick="showHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      All Departments
    </button>
  </nav>

  <!-- ══ SCREEN: HOME (department cards grid) ══ -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <h1 class="home-title">Departments</h1>
      <p class="home-sub">Tap a department to learn more</p>
    </div>
    <div class="dept-grid" id="dept-grid"></div>
  </div>

  <!-- ══ SCREEN: DETAIL ══ -->
  <div class="screen" id="screen-detail">

    <div class="detail-layout">

      <!-- Left: HOD portrait -->
      <div class="portrait-side">
        <div class="portrait-frame" id="portrait-frame">
          <img class="portrait-img" id="portrait-img" src="" alt="">
          <div class="portrait-shine" aria-hidden="true"></div>
          <div class="portrait-silhouette hidden" id="portrait-silhouette">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
              <circle cx="12" cy="8" r="5"/>
              <path d="M3 21c0-5 3.582-9 9-9s9 4 9 9"/>
            </svg>
          </div>
        </div>
        <div class="portrait-info">
          <div class="portrait-role" id="portrait-role"></div>
          <div class="portrait-name" id="portrait-name"></div>
          <button class="profile-btn" id="profile-btn" onclick="openProfile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/>
            </svg>
            View Profile
          </button>
        </div>
      </div>

      <!-- Right: Department brief -->
      <div class="brief-side glass-panel">
        <div class="brief-tag">DEPARTMENT BRIEF</div>
        <h2 class="brief-dept-name" id="brief-dept-name"></h2>
        <div class="brief-divider"></div>
        <div class="brief-scroll">
          <p class="brief-text" id="brief-text"></p>
        </div>
      </div>

    </div>

    <!-- Chronicles of Command strip -->
    <div class="chronicles-strip" id="chronicles-strip">
      <div class="chronicles-label">CHRONICLES<br>OF COMMAND</div>
      <div class="chronicles-scroll" id="chronicles-scroll"></div>
    </div>

  </div>

  <!-- ══ PROFILE MODAL ══ -->
  <div class="modal-overlay hidden" id="modal" onclick="closeProfile(event)">
    <div class="modal-card glass-panel">
      <button class="modal-close" onclick="closeProfile()">&times;</button>
      <div class="modal-photo-frame">
        <img class="modal-photo" id="modal-photo" src="" alt="">
        <div class="modal-photo-silhouette hidden" id="modal-photo-silhouette">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
            <circle cx="12" cy="8" r="5"/><path d="M3 21c0-5 3.582-9 9-9s9 4 9 9"/>
          </svg>
        </div>
        <div class="modal-shine" aria-hidden="true"></div>
      </div>
      <div class="modal-body">
        <div class="modal-role" id="modal-role"></div>
        <h2 class="modal-name" id="modal-name"></h2>
        <div class="modal-divider"></div>
        <div class="modal-bio-scroll">
          <p class="modal-bio" id="modal-bio"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
